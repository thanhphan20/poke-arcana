name: CI Pipeline

on:
  push:
    branches: [main, ai/**, fix/**, refactor/**, test/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync Pokedex data and sprites
        run: bun run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run type checking
        run: bun run typecheck

      - name: Run linting
        run: bun run lint
